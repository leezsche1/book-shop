<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<!-- 결제 UI -->
<div id="payment-method"></div>
<!-- 이용약관 UI -->
<div id="agreement"></div>
<!-- 결제하기 버튼 -->
<button class="button" id="payment-button" style="margin-top: 30px">결제하기</button>

<script th:inline="javascript">
    const orderIdFromServer = [[${orderId}]];
    const totalPriceFromServer = [[${totalPrice}]];
</script>

<script>
    main();

    async function main() {
      const button = document.getElementById("payment-button");
      // ------  결제위젯 초기화 ------
      const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";
      const tossPayments = TossPayments(clientKey);
      // 회원 결제
      const customerKey = "iKQEeGtKSHratKfJk385r";
      const widgets = tossPayments.widgets({
        customerKey,
      });
      // 비회원 결제
      // const widgets = tossPayments.widgets({ customerKey: TossPayments.ANONYMOUS });

      // ------ 주문의 결제 금액 설정 ------
      await widgets.setAmount({
        currency: "KRW",
        value: totalPriceFromServer,
      });

      await Promise.all([
        // ------  결제 UI 렌더링 ------
        widgets.renderPaymentMethods({
          selector: "#payment-method",
          variantKey: "DEFAULT",
        }),
        // ------  이용약관 UI 렌더링 ------
        widgets.renderAgreement({ selector: "#agreement", variantKey: "AGREEMENT" }),
      ]);

      // ------ '결제하기' 버튼 누르면 결제창 띄우기 ------
      button.addEventListener("click", async function () {
        // 1) 예약 먼저
        const reserveOk = await reserveBeforePay(orderIdFromServer);
        if (!reserveOk) return;

        // 2) 예약 성공시에만 결제창
        await widgets.requestPayment({
          orderId: String(orderIdFromServer),
          orderName: "클린 코드 외 1건",
          successUrl: window.location.origin + "/success.html",
          failUrl: window.location.origin + "/fail.html",
          customerEmail: "customer123@gmail.com",
          customerName: "김토스",
          customerMobilePhone: "01012341234",
        });
      });
    }

    async function reserveBeforePay(orderId) {
        try {
            const res = await fetch("/api/reserve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ orderId }),
        });

        if (res.ok) {
          return true; // 예약 성공
        }

        // 예약 실패(409 등)
        alert("예약에 실패했습니다. (재고/포인트 등을 확인해주세요)");
            return false;
        } catch (e) {
            alert("네트워크 오류로 예약에 실패했습니다.");
            return false;
        }
    }
</script>
</body>
</html>
